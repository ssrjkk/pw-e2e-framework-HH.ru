name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npx prettier --check src/

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 5
          curl -sf http://localhost:3000/health || (echo "Server not ready" && exit 1)
      - name: Run smoke tests
        run: npm run test:smoke -- --reporter=list
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3000

  api-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 5
          curl -sf http://localhost:3000/health || (echo "Server not ready" && exit 1)
      - name: Run API tests
        run: npm run test:api -- --reporter=list
        env:
          CI: true
          API_BASE_URL: http://localhost:3000

  ui-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 5
          curl -sf http://localhost:3000/health || (echo "Server not ready" && exit 1)
      - name: Run UI tests
        run: npm test -- --reporter=list
        env:
          CI: true
          BASE_URL: http://localhost:3000