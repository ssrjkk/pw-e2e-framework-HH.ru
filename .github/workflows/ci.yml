name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npx prettier --check src/

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install chromium
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 3
          curl -s http://localhost:3000/health || exit 1
      - name: Run smoke tests
        run: npm run test:smoke
        env:
          CI: true
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:3000

  api-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 3
          curl -s http://localhost:3000/health || exit 1
      - name: Run API tests
        run: npm run test:api
        env:
          CI: true
          API_BASE_URL: http://localhost:3000

  ui-test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npx playwright install ${{ matrix.browser }}
      - name: Start mock server
        run: |
          node mock-server.js &
          sleep 3
          curl -s http://localhost:3000/health || exit 1
      - name: Run UI tests
        run: npm test
        env:
          CI: true
          BASE_URL: http://localhost:3000
          BROWSERS: ${{ matrix.browser }}